# ==========================================
# Portfolio Photographe - Application Config
# ==========================================

# Server
server.port=8080
server.servlet.context-path=/

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:portfolio_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Disable Spring's SQL initializer (tables managed by Hibernate DDL)
spring.sql.init.mode=never

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=600MB

# Cloudinary — Stockage cloud des images et vidéos
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dqdhcp3lo}
cloudinary.api-key=${CLOUDINARY_API_KEY:768376939198354}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:v5O7PJPev_n52rXXIuN3txM6klo}

# JWT
app.jwt.secret=${JWT_SECRET:MyVerySecretKeyForPortfolioApp2025PleaseChangeInProduction}
app.jwt.expiration=${JWT_EXPIRATION:14400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,https://portfolio-app-frontend-eight.vercel.app}

# Mail
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.admin=${ADMIN_EMAIL:admin@portfolio.com}
app.mail.from=${MAIL_FROM:noreply@portfolio.com}

# Logging
logging.level.com.portfolio=INFO
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
